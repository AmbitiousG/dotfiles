add_newline = false
format = "$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"

[username]
show_always = true
format = "[$user]($style)@"

[hostname]
ssh_only = false
format = "[$hostname]($style) "

[character]
success_symbol = "[>](purple)"
error_symbol = "[>](red)"

[cmd_duration]
format = "[$duration]($style) "
